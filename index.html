<!DOCTYPE html>
<html lang="en" data-theme="space">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CuriousSpace — Interactive Science Simulations</title>
<style>
  :root {
    --orange: #FF8A3D;
    --orange-light: #FFB169;
    --orange-deep: #F5661E;
    --amber: #FFC94D;
    --nebula-1: #6a2cff;
    --nebula-2: #ff4d7d;
    --space-0: #05040f;
    --space-1: #0c0a24;
    --surface: rgba(22, 18, 48, 0.72);
    --surface-solid: #16122f;
    --text: #f3eefe;
    --text-soft: #a99fce;
    --border: rgba(140, 120, 220, 0.22);
    --shadow: rgba(0, 0, 0, 0.55);
    --glow: rgba(255, 138, 61, 0.35);
    --chip-bg: rgba(120, 90, 220, 0.16);
  }
  html[data-theme="light"] {
    --orange: #F57C00; --orange-light: #FF9E40; --orange-deep: #E65100; --amber: #E65100;
    --space-0: #fff7f0; --space-1: #fff7f0;
    --surface: #ffffff; --surface-solid: #ffffff;
    --text: #1f2024; --text-soft: #616161;
    --border: #f0e0d0; --shadow: rgba(245,124,0,0.18);
    --glow: rgba(245,124,0,0.25); --chip-bg: #fff0e2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    color: var(--text); min-height: 100vh; padding: 28px 20px 60px;
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(106,44,255,0.28), transparent 60%),
      radial-gradient(1000px 500px at 90% 0%, rgba(255,77,125,0.18), transparent 55%),
      linear-gradient(180deg, var(--space-1) 0%, var(--space-0) 100%);
    background-attachment: fixed;
    transition: color 0.3s ease;
  }
  html[data-theme="light"] body { background: var(--space-1); }

  /* Starfield */
  #stars { position: fixed; inset: 0; z-index: -2; pointer-events: none; }
  html[data-theme="light"] #stars { opacity: 0; }

  .wrap { max-width: 980px; margin: 0 auto; position: relative; z-index: 1; }

  /* ---------- Header ---------- */
  header {
    position: relative; text-align: center; padding: 60px 24px 60px;
    margin-bottom: 26px; border-radius: 26px; color: #fff; overflow: hidden;
    isolation: isolate;
    background:
      radial-gradient(700px 260px at 80% 120%, rgba(255,138,61,0.55), transparent 60%),
      linear-gradient(135deg, #2a1a5e 0%, #3d1d63 45%, #7a2a4d 100%);
    border: 1px solid rgba(160,130,255,0.28);
    box-shadow: 0 20px 60px rgba(20,8,60,0.6), inset 0 0 60px rgba(120,80,255,0.15);
  }
  html[data-theme="light"] header {
    background: linear-gradient(135deg, var(--orange-light) 0%, var(--orange) 52%, var(--orange-deep) 100%);
    border: none; box-shadow: 0 12px 34px var(--glow);
  }
  /* Orbiting planet system */
  .orbit-wrap { position: absolute; top: 50%; left: 50%; width: 300px; height: 300px; transform: translate(-50%,-50%); z-index: -1; opacity: 0.9; }
  .orbit { position: absolute; inset: 0; border: 1px dashed rgba(255,255,255,0.18); border-radius: 50%; animation: orbitSpin 18s linear infinite; }
  .orbit.o2 { inset: 46px; animation-duration: 11s; animation-direction: reverse; }
  .planet { position: absolute; top: -9px; left: 50%; width: 18px; height: 18px; margin-left: -9px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ffd08a, var(--orange-deep)); box-shadow: 0 0 14px var(--glow); }
  .orbit.o2 .planet { width: 12px; height: 12px; margin-left: -6px; top: -6px;
    background: radial-gradient(circle at 30% 30%, #b4a5ff, #6a2cff); box-shadow: 0 0 12px rgba(120,80,255,0.7); }
  @keyframes orbitSpin { to { transform: rotate(360deg); } }

  .badge-top {
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.28);
    padding: 5px 14px; border-radius: 999px; font-size: 0.76rem; font-weight: 600;
    letter-spacing: 1px; margin-bottom: 18px; backdrop-filter: blur(4px);
  }
  .pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: #7CFFB2; box-shadow: 0 0 8px #7CFFB2; animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(1.5);} }
  .brand { font-size: 3.2rem; font-weight: 800; letter-spacing: -1px; line-height: 1; text-shadow: 0 4px 24px rgba(0,0,0,0.35); }
  .brand .spark { display: inline-block; animation: spin 6s linear infinite; color: var(--amber); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tagline { margin-top: 14px; font-size: 1.1rem; opacity: 0.92; font-weight: 400; }

  .stats { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; margin-top: 28px; }
  .stat { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 14px; padding: 12px 22px; min-width: 100px; backdrop-filter: blur(4px); }
  .stat .num { font-size: 1.8rem; font-weight: 800; line-height: 1; }
  .stat .lbl { font-size: 0.7rem; opacity: 0.9; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.8px; }

  /* ---------- Toolbar ---------- */
  .toolbar {
    position: sticky; top: 12px; z-index: 20; display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px;
    box-shadow: 0 8px 26px var(--shadow); margin-bottom: 8px; backdrop-filter: blur(12px);
  }
  .search { flex: 1 1 200px; display: flex; align-items: center; gap: 8px; background: var(--chip-bg); border-radius: 10px; padding: 9px 13px; border: 1px solid transparent; transition: border-color .15s; }
  .search:focus-within { border-color: var(--orange); }
  .search input { border: none; background: transparent; outline: none; width: 100%; font-size: 0.95rem; color: var(--text); font-family: inherit; }
  .search input::placeholder { color: var(--text-soft); }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { border: 1px solid var(--border); background: transparent; color: var(--text-soft); border-radius: 999px; padding: 8px 15px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all .15s ease; font-family: inherit; white-space: nowrap; }
  .chip:hover { border-color: var(--orange); color: var(--orange); }
  .chip.active { background: linear-gradient(135deg, var(--nebula-1), var(--orange-deep)); color: #fff; border-color: transparent; box-shadow: 0 3px 14px var(--glow); }
  .theme-toggle { border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; width: 42px; height: 42px; border-radius: 12px; font-size: 1.15rem; display: grid; place-items: center; transition: all .15s; }
  .theme-toggle:hover { border-color: var(--orange); transform: rotate(15deg); }

  /* ---------- Sections ---------- */
  .section-title { font-size: 1.35rem; font-weight: 800; color: var(--amber); margin: 36px 0 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .section-title .count { margin-left: auto; font-size: 0.72rem; font-weight: 700; background: var(--chip-bg); color: var(--text); padding: 3px 11px; border-radius: 999px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 18px; }

  a.card {
    display: flex; flex-direction: column; gap: 10px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 22px 20px; text-decoration: none; color: var(--text); position: relative; overflow: hidden;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    opacity: 0; transform: translateY(14px); backdrop-filter: blur(8px);
  }
  a.card.reveal { opacity: 1; transform: translateY(0); }
  a.card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--nebula-1), var(--orange)); transform: scaleX(0); transform-origin: left; transition: transform .25s ease; }
  a.card::after { content: ""; position: absolute; inset: 0; background: radial-gradient(200px 120px at var(--mx,50%) var(--my,0%), rgba(255,138,61,0.12), transparent 70%); opacity: 0; transition: opacity .2s; pointer-events: none; }
  a.card:hover { transform: translateY(-5px); box-shadow: 0 16px 34px var(--shadow); border-color: var(--orange); }
  a.card:hover::before { transform: scaleX(1); }
  a.card:hover::after { opacity: 1; }
  .card-icon { width: 48px; height: 48px; border-radius: 12px; display: grid; place-items: center; font-size: 1.5rem; background: var(--chip-bg); border: 1px solid var(--border); }
  .card-title { font-size: 1.18rem; font-weight: 700; color: var(--text); }
  .card-desc { font-size: 0.88rem; color: var(--text-soft); line-height: 1.5; flex: 1; }
  .card-tag { align-self: flex-start; font-size: 0.7rem; font-weight: 700; color: var(--amber); background: var(--chip-bg); padding: 4px 10px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-go { font-size: 0.82rem; font-weight: 700; color: var(--orange); display: flex; align-items: center; gap: 5px; }
  .card-go .arrow { transition: transform .15s; }
  a.card:hover .card-go .arrow { transform: translateX(4px); }

  .empty { display: none; text-align: center; padding: 50px 20px; color: var(--text-soft); }
  .empty.show { display: block; }
  .empty .big { font-size: 2.6rem; margin-bottom: 8px; }

  footer { text-align: center; margin-top: 60px; padding-top: 26px; border-top: 1px solid var(--border); font-size: 0.82rem; color: var(--text-soft); }
  footer .heart { color: var(--orange); }

  @media (max-width: 480px) { .brand { font-size: 2.5rem; } .orbit-wrap { opacity: 0.5; } }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="wrap">
  <header>
    <div class="orbit-wrap">
      <div class="orbit"><span class="planet"></span></div>
      <div class="orbit o2"><span class="planet"></span></div>
    </div>
    <div class="badge-top"><span class="pulse-dot"></span> MISSION CONTROL · ONLINE</div>
    <div class="brand">Curious<span class="spark">✷</span>Space</div>
    <div class="tagline">Explore science through hands-on cosmic simulations 🚀</div>
    <div class="stats">
      <div class="stat"><div class="num" data-count="7">0</div><div class="lbl">Simulations</div></div>
      <div class="stat"><div class="num" data-count="4">0</div><div class="lbl">Subjects</div></div>
      <div class="stat"><div class="num" data-count="100" data-suffix="%">0</div><div class="lbl">Interactive</div></div>
    </div>
  </header>

  <div class="toolbar">
    <label class="search">
      <span>🔭</span>
      <input type="text" id="search" placeholder="Search the galaxy of simulations…" autocomplete="off">
    </label>
    <div class="filters" id="filters">
      <button class="chip active" data-filter="all">🌌 All</button>
      <button class="chip" data-filter="energy">🔋 Energy</button>
      <button class="chip" data-filter="thermal">🔥 Thermal</button>
      <button class="chip" data-filter="electricity">⚡ Electricity</button>
      <button class="chip" data-filter="light">💡 Light</button>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">☀️</button>
  </div>

  <div id="content"></div>

  <div class="empty" id="empty">
    <div class="big">🛸</div>
    <div>No simulations found in this sector — try another search.</div>
  </div>

  <footer>
    Built with <span class="heart">♥</span> for curious minds · CuriousSpace © 2026
  </footer>
</div>

<script>
  /* ---------- Starfield + shooting stars ---------- */
  (function() {
    const c = document.getElementById('stars');
    const ctx = c.getContext('2d');
    let stars = [], shooters = [], W, H;
    function resize() { W = c.width = innerWidth; H = c.height = innerHeight;
      stars = Array.from({length: Math.min(180, Math.floor(W*H/9000))}, () => ({
        x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.4+0.2,
        a: Math.random(), s: Math.random()*0.02+0.004 })); }
    resize(); addEventListener('resize', resize);
    function spawnShooter() { shooters.push({ x: Math.random()*W, y: Math.random()*H*0.4,
      len: Math.random()*120+60, vx: -(Math.random()*4+3), vy: Math.random()*2+1.5, life: 1 }); }
    let tick = 0;
    (function loop() {
      ctx.clearRect(0,0,W,H);
      for (const st of stars) { st.a += st.s; const tw = 0.5+0.5*Math.sin(st.a);
        ctx.globalAlpha = tw*0.9; ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(st.x, st.y, st.r, 0, 7); ctx.fill(); }
      ctx.globalAlpha = 1;
      for (let i = shooters.length-1; i>=0; i--) { const s = shooters[i];
        const g = ctx.createLinearGradient(s.x, s.y, s.x+s.len, s.y-s.len*s.vy/-s.vx);
        g.addColorStop(0, 'rgba(255,200,140,'+s.life+')'); g.addColorStop(1, 'rgba(255,200,140,0)');
        ctx.strokeStyle = g; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x + s.len*(s.vx<0?1:-1)*-1, s.y + s.len*(s.vy)/Math.hypot(s.vx,s.vy)*-1); ctx.stroke();
        s.x += s.vx*3; s.y += s.vy*3; s.life -= 0.012; if (s.life <= 0) shooters.splice(i,1); }
      if (++tick % 140 === 0 && Math.random() < 0.7) spawnShooter();
      requestAnimationFrame(loop);
    })();
  })();

  /* ---------- Catalogue ---------- */
  const DATA = [
    { cat: "energy", catLabel: "Energy", catIcon: "🔋", items: [
      { title: "Energy Stores & Transfers", icon: "⚙️", tag: "Energy", href: "energy-stores-transfers.html",
        desc: "Explore how energy is stored and transferred between systems." },
    ]},
    { cat: "thermal", catLabel: "Thermal Physics", catIcon: "🔥", items: [
      { title: "Thermal Processes", icon: "🌡️", tag: "Heat Flow", href: "thermal-processes.html",
        desc: "Conduction, convection, and radiation in action." },
      { title: "Cooking Chef", icon: "👨‍🍳", tag: "Heat Transfer", href: "cooking-chef.html",
        desc: "Heat, temperature, and energy transfer in the kitchen." },
    ]},
    { cat: "electricity", catLabel: "Electricity", catIcon: "⚡", items: [
      { title: "Electricity Overview", icon: "🔌", tag: "Circuits", href: "electricity-overview.html",
        desc: "Current, voltage, and resistance — how they relate." },
      { title: "Current Splitting Snake", icon: "🐍", tag: "Parallel", href: "current-splitting-snake.html",
        desc: "Watch current divide across parallel paths." },
      { title: "Current Bank Analogy", icon: "🏦", tag: "Analogy", href: "current-bank-analogy.html",
        desc: "Understand current flow through a bank model." },
    ]},
    { cat: "light", catLabel: "Light", catIcon: "💡", items: [
      { title: "Laser Reflection", icon: "🔦", tag: "Reflection", href: "laser-reflection.html",
        desc: "Aim, reflect, and hit the target with light." },
    ]},
  ];

  const content = document.getElementById('content');
  const empty = document.getElementById('empty');
  let activeFilter = "all", query = "";

  function render() {
    content.innerHTML = ""; let shown = 0;
    DATA.forEach(section => {
      if (activeFilter !== "all" && activeFilter !== section.cat) return;
      const items = section.items.filter(it =>
        (it.title + " " + it.desc + " " + it.tag).toLowerCase().includes(query));
      if (!items.length) return; shown += items.length;
      const h = document.createElement('div');
      h.className = 'section-title';
      h.innerHTML = `<span>${section.catIcon}</span> ${section.catLabel}<span class="count">${items.length}</span>`;
      content.appendChild(h);
      const grid = document.createElement('div'); grid.className = 'grid';
      items.forEach(it => {
        const a = document.createElement('a'); a.className = 'card'; a.href = it.href;
        a.innerHTML = `<div class="card-icon">${it.icon}</div>
          <span class="card-tag">${it.tag}</span>
          <div class="card-title">${it.title}</div>
          <div class="card-desc">${it.desc}</div>
          <div class="card-go">Launch <span class="arrow">→</span></div>`;
        a.addEventListener('mousemove', e => { const r = a.getBoundingClientRect();
          a.style.setProperty('--mx', (e.clientX-r.left)+'px'); a.style.setProperty('--my', (e.clientY-r.top)+'px'); });
        grid.appendChild(a);
      });
      content.appendChild(grid);
    });
    empty.classList.toggle('show', shown === 0);
    revealCards();
  }

  function revealCards() {
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => { if (e.isIntersecting) {
        setTimeout(() => e.target.classList.add('reveal'), i * 60); io.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('a.card').forEach(c => io.observe(c));
  }

  document.getElementById('search').addEventListener('input', e => { query = e.target.value.trim().toLowerCase(); render(); });
  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.chip'); if (!btn) return;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active'); activeFilter = btn.dataset.filter; render();
  });

  const themeBtn = document.getElementById('themeToggle');
  const saved = localStorage.getItem('cs-theme');
  if (saved === 'light') { document.documentElement.setAttribute('data-theme', 'light'); themeBtn.textContent = '🌙'; }
  themeBtn.addEventListener('click', () => {
    const light = document.documentElement.getAttribute('data-theme') === 'light';
    if (light) { document.documentElement.setAttribute('data-theme', 'space'); themeBtn.textContent = '☀️'; localStorage.setItem('cs-theme', 'space'); }
    else { document.documentElement.setAttribute('data-theme', 'light'); themeBtn.textContent = '🌙'; localStorage.setItem('cs-theme', 'light'); }
  });

  function countUp() {
    document.querySelectorAll('.stat .num').forEach(el => {
      const target = +el.dataset.count, suffix = el.dataset.suffix || "";
      const step = Math.max(1, Math.ceil(target / 30)); let n = 0;
      const t = setInterval(() => { n += step; if (n >= target) { n = target; clearInterval(t); }
        el.textContent = n + suffix; }, 30);
    });
  }

  render(); countUp();
</script>
</body>
</html>
